<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Invitación 15</title>

  <!-- Tipografías -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <div class="contenedor" id="contenido">

    <!-- ✨ Título estilo invitación -->
    <h2 class="tituloArriba">Ernestina</h2>
    <h1 class="tituloPrincipal">Mis 15 Años</h1>

        <!-- 👑 Nombre dinámico -->
    <h1 id="tituloInvitado"></h1>
    <p class="subtitulo">Te invito a celebrar mis 15</p>

    <!-- 📅 Info -->
    <div class="infoEvento">
       <div>Domingo</div>
       <div>24 de Mayo</div>
       <div>21:00 hs</div>
    </div>

    
  <div class="infoExtra">

  <div class="itemExtra">
    <a href="https://maps.app.goo.gl/h1SJJaXM7u4gNSdU6" target="_blank" class="btnIcono">
      <span class="material-symbols-outlined">location_on</span>
    </a>
    <p>Ver Ubicacion</p>
  </div>

  <div class="itemExtra">
    <div class="btnIcono">
      <span class="material-symbols-outlined">redeem</span>
    </div>
    <p>Alias: colqueernes</p>
  </div>

  <div class="itemExtra">
    <div class="btnIcono">
      <span class="material-symbols-outlined">auto_awesome</span>
    </div>
    <p>Dress Code Elegante</p>
  </div>
  
</div>

    <!-- ✔ Confirmación -->
    <p>¿Vas a asistir?</p>

    <div class="opciones">
      <label><input type="radio" name="asiste" value="SI"> Sí, asistiré</label>
      <label><input type="radio" name="asiste" value="NO"> No podré</label>
    </div>

    <!-- 👨‍👩‍👧 Invitados dinámicos -->
    <div id="listaInvitados">¿Quienes Asistirán?</div>

    <!-- 🔘 Botón -->
    <button id="btnConfirmar" onclick="confirmarAsistencia()">
      Confirmar Asistencia
    </button>

  </div>

  <script src="script.js"></script>
</body>
</html>
